{% extends "index.html" %} {% block content %}
<h2>Terminal</h2>
<div
    id="terminal-output"
    style="
        background: #1e1e1e;
        color: #39ff14;
        text-shadow: 0 0 5px #39ff14, 0 0 10px #39ff14;
        font-family: monospace;
        flex: 1;
        min-height: 0;
        padding: 15px;
        overflow-y: scroll;
        margin-bottom: 10px;
        white-space: pre-wrap;
        border-radius: 4px;
    "
></div>
<div style="display: flex; gap: 10px">
    <input
        type="text"
        id="cmd-input"
        style="
            flex: 1;
            padding: 10px;
            font-family: monospace;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
        "
        placeholder="Enter command to run in the workspace..."
    />
    <button
        onclick="runCommand()"
        style="
            padding: 10px 20px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        "
    >
        Execute
    </button>
</div>

<script>
    async function runCommand() {
        const input = document.getElementById("cmd-input");
        const cmd = input.value;
        if (!cmd) return;

        const outputBox = document.getElementById("terminal-output");
        outputBox.innerHTML += `<span>$ ${cmd}</span>\n`;
        input.value = "";

        try {
            const res = await fetch("/api/terminal", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ command: cmd }),
            });
            const data = await res.json();
            if (data.output) {
                outputBox.innerHTML += data.output;
            } else if (data.error) {
                outputBox.innerHTML += `<span style="color: red;">${data.error}</span>\n`;
            }
        } catch (e) {
            outputBox.innerHTML += `<span style="color: red;">Network Error: ${e}</span>\n`;
        }

        outputBox.scrollTop = outputBox.scrollHeight;
    }

    document
        .getElementById("cmd-input")
        .addEventListener("keypress", function (e) {
            if (e.key === "Enter") runCommand();
        });
</script>
{% endblock %}
