{% extends "index.html" %} {% block content %}
<h2>Terminal</h2>
<div id="terminal-container" style="flex: 1; min-height: 0; background: #0c0c0c; border-radius: 4px; padding: 10px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 20px;">
    <div id="terminal" style="height: 100%; width: 100%;"></div>
</div>

<!-- Load Socket.IO Client -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<!-- Load Xterm.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

<script>
    const socket = io();

    // Initialize Terminal
    const term = new Terminal({
        cursorBlink: true,
        theme: {
            background: '#0c0c0c',
            foreground: '#e0e0e0',
            cursor: '#39ff14',
            selection: '#555555',
            black: '#000000',
            red: '#cd3131',
            green: '#0dbc79',
            yellow: '#e5e510',
            blue: '#2472c8',
            magenta: '#bc3fbc',
            cyan: '#11a8cd',
            white: '#e5e5e5',
            brightBlack: '#666666',
            brightRed: '#f14c4c',
            brightGreen: '#23d18b',
            brightYellow: '#f5f543',
            brightBlue: '#3b8eea',
            brightMagenta: '#d670d6',
            brightCyan: '#29b8db',
            brightWhite: '#e5e5e5'
        },
        fontFamily: 'Courier New, Courier, monospace',
        fontSize: 14
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    
    // Socket listeners
    socket.on('connect', () => {
        socket.emit('terminal_connect');
        sendSize();
    });

    socket.on('terminal_output', (data) => {
        term.write(data.output);
    });

    // Terminal data -> Socket
    term.onData((data) => {
        socket.emit('terminal_input', { input: data });
    });

    // Resize handler
    function sendSize() {
        if (fitAddon) {
            try {
                fitAddon.fit();
                socket.emit('terminal_resize', {
                    rows: term.rows,
                    cols: term.cols
                });
            } catch (e) {
                console.error("Fit error", e);
            }
        }
    }

    // Wait a bit for CSS to render before fitting
    setTimeout(sendSize, 100);

    window.addEventListener('resize', () => {
        sendSize();
    });
</script>
<style>
    /* Prevent vertical scroll bars on the parent xterm element */
    .xterm {
        padding: 5px;
    }
</style>
{% endblock %}
