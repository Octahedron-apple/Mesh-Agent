{% extends "index.html" %}

{% block content %}
<h2>Agent Configuration</h2>
<div style="display: flex; flex-direction: column; gap: 15px; max-width: 500px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
    <div>
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">OpenRouter API Key:</label>
        <input type="password" id="api-key" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" placeholder="sk-or-v1-..." />
    </div>
    
    <div>
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Model Name:</label>
        <input type="text" id="model-name" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" value="openai/gpt-oss-120b:free" />
    </div>
    
    <button onclick="saveConfig()" style="padding: 12px; background: #74c221; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 1em;">Save Configuration</button>
    <div id="status-msg" style="text-align: center; font-weight: bold;"></div>
</div>

<script>
async function saveConfig() {
    const api_key = document.getElementById('api-key').value;
    const model = document.getElementById('model-name').value;
    const status = document.getElementById('status-msg');
    
    status.innerHTML = 'Saving...';
    
    try {
        const res = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key, model })
        });
        const data = await res.json();
        
        if (data.status === 'ok') {
            status.innerHTML = '<span style="color: green;">Agent configured and started successfully!</span>';
        } else {
            status.innerHTML = `<span style="color: red;">Error: ${data.error}</span>`;
        }
    } catch (e) {
        status.innerHTML = `<span style="color: red;">Network Error: ${e}</span>`;
    }
}
</script>
{% endblock %}
