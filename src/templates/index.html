<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent</title>
    <style>
        body {
            margin: 0;
        }

        .Sidebar {
            display: flex;
            flex-direction: column;
            width: 200px;
            height: 100vh;
            background-color: #74c221;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid #ddd;
            position: fixed;
            left: 0;
            top: 0;
            gap: 15px;
            font-family: sans-serif;
        }

        .Sidebar a {
            text-decoration: none;
            color: #333;
        }
    </style>
</head>

    <div class="Sidebar">
        <a href="/">Chat</a>
        <a href="/terminal">Terminal</a>
        <a href="/config">Credentials</a>
        <a href="/workspace">Files</a>
    </div>
    <div style="margin-left: 200px; padding: 20px; font-family: sans-serif; box-sizing: border-box; height: 100vh; overflow-y: auto;">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
