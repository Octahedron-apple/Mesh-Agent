{% extends "index.html" %} {% block content %}
<h2>Chat</h2>
<div
    id="chat-box"
    style="
        border: 1px solid var(--chat-border);
        flex: 1;
        min-height: 0;
        padding: 10px;
        overflow-y: scroll;
        margin-bottom: 5px;
        background: var(--chat-bg);
    "
></div>
<div
    id="agent-status"
    style="height: 20px; color: #74c221; margin-bottom: 5px; font-size: 0.9em"
></div>
<div style="display: flex; gap: 10px">
    <textarea
        id="prompt-input"
        style="
            flex: 1;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background: var(--input-bg);
            color: var(--input-text);
            resize: none;
            font-family: sans-serif;
            box-sizing: border-box;
            height: 40px;
            max-height: 150px;
            overflow-y: auto;
        "
        placeholder="Type a message..."
    ></textarea>
    <button
        onclick="sendPrompt()"
        style="
            padding: 10px 20px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
        "
    >
        Send
    </button>
</div>

<!-- Human in the loop modal overlay -->
<div
    id="hitl-modal"
    style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--modal-overlay);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    "
>
    <div
        style="
            background: var(--modal-bg);
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            max-width: 90%;
        "
    >
        <h3>Action Approval Required</h3>
        <p>The agent wants to perform the following action:</p>
        <pre
            id="hitl-action"
            style="
                background: var(--modal-pre-bg);
                padding: 10px;
                overflow-x: auto;
                font-size: 0.9em;
            "
        ></pre>
        <input
            type="text"
            id="hitl-reason"
            placeholder="Reason (optional)"
            style="
                width: 100%;
                padding: 8px;
                margin-bottom: 15px;
                box-sizing: border-box;
                background: var(--input-bg);
                color: var(--input-text);
                border: 1px solid var(--input-border);
            "
        />
        <div style="display: flex; justify-content: flex-end; gap: 10px">
            <button
                onclick="respondHitl(false)"
                style="
                    padding: 8px 15px;
                    background: #dc3545;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                "
            >
                Reject
            </button>
            <button
                onclick="respondHitl(true)"
                style="
                    padding: 8px 15px;
                    background: #28a745;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                "
            >
                Approve
            </button>
        </div>
    </div>
</div>

<!-- Socket.IO Client -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<script>
    const socket = io();

    socket.on("connect", () => {
        socket.emit("request_state");
    });

    socket.on("messages_update", (data) => {
        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML = "";
        if (data.messages) {
            data.messages.forEach((msg) => {
                if (msg.role === 'system') return;
                
                const div = document.createElement("div");
                div.style.marginBottom = "15px";

                let contentHTML = "";
                if (msg.content) {
                    if (typeof msg.content === "string") {
                        contentHTML = msg.content.replace(/\n/g, "<br/>");
                    } else {
                        contentHTML = JSON.stringify(msg.content, null, 2);
                    }
                }

                if (msg.tool_calls && msg.tool_calls.length > 0) {
                    let toolsHTML = msg.tool_calls
                        .map((tc) => {
                            let args = tc.function.arguments;
                            try {
                                args = JSON.stringify(
                                    JSON.parse(args),
                                    null,
                                    2,
                                );
                            } catch (e) {}
                            return `<div style="margin-top: 10px; padding: 10px; background: var(--tool-bg); border-left: 4px solid #007bff; border-radius: 4px;">
                        <strong>Tool Call:</strong> <code>${tc.function.name}</code>
                        <pre style="margin-top: 5px; margin-bottom: 0; font-size: 0.9em; white-space: pre-wrap; color: var(--text-color);">${args}</pre>
                    </div>`;
                        })
                        .join("");
                    contentHTML += toolsHTML;
                }

                let headerText = msg.role;
                if (msg.role === "tool" && msg.name) {
                    headerText = `Tool Result (${msg.name})`;
                }

                if (!contentHTML && msg.role === "assistant") {
                    contentHTML =
                        '<em style="color: #999;">Using tools...</em>';
                }

                div.innerHTML = `<strong style="text-transform: capitalize; color: var(--msg-text);">${headerText}:</strong> <div style="margin-top: 5px; background: var(--msg-bg); padding: 10px; border-radius: 4px;">${contentHTML}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    socket.on("status_update", (data) => {
        const statusDiv = document.getElementById("agent-status");
        if (!data.configured) {
            statusDiv.innerHTML =
                '<span style="color: #aaa;">Not configured — go to <a href="/config">Config</a></span>';
        } else if (data.pending_hitl) {
            statusDiv.innerHTML =
                '<span style="color: #e67e22;">Waiting for your approval...</span>';
        } else if (data.thinking) {
            statusDiv.innerHTML =
                '<span style="color: #74c221;">Agent is thinking...</span>';
        } else {
            statusDiv.innerHTML =
                '<span style="color: #aaa;">Agent idle</span>';
        }
    });

    socket.on("hitl_pending", (data) => {
        const modal = document.getElementById("hitl-modal");
        if (data.pending) {
            document.getElementById("hitl-action").textContent =
                JSON.stringify(data.action, null, 2);
            modal.style.display = "flex";
        } else {
            modal.style.display = "none";
        }
    });

    async function sendPrompt() {
        const input = document.getElementById("prompt-input");
        const text = input.value;
        if (!text) return;
        input.value = "";
        input.style.height = "40px";
        document.getElementById("agent-status").innerHTML =
            '<span style="color: #74c221;">Agent is thinking...</span>';
        try {
            await fetch("/api/prompt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text }),
            });
            // The server will push a messages_update via Socket.IO
        } catch (e) {
            document.getElementById("agent-status").innerHTML =
                `<span style="color: red;">Error: ${e.message || e}</span>`;
        }
    }

    const tx = document.getElementById("prompt-input");
    tx.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = (this.scrollHeight) + "px";
    });

    tx.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendPrompt();
        }
    });

    async function respondHitl(approved) {
        const reason = document.getElementById("hitl-reason").value;
        await fetch("/api/hitl/respond", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ approved, reason }),
        });
        // modal hidden immediately here, but the server will also push a hitl_pending false update
        document.getElementById("hitl-modal").style.display = "none";
        document.getElementById("hitl-reason").value = "";
    }
</script>
{% endblock %}
