{% extends "index.html" %}

{% block content %}
<h2>Chat</h2>
<div id="chat-box" style="border: 1px solid #ccc; height: 400px; padding: 10px; overflow-y: scroll; margin-bottom: 5px; background: #fff;"></div>
<div id="agent-status" style="height: 20px; color: #74c221; margin-bottom: 5px; font-size: 0.9em;"></div>
<div style="display: flex; gap: 10px;">
    <input type="text" id="prompt-input" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" placeholder="Type a message..." />
    <button onclick="sendPrompt()" style="padding: 10px 20px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer;">Send</button>
</div>

<!-- Human in the loop modal overlay -->
<div id="hitl-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 20px; border-radius: 8px; width: 400px; max-width: 90%;">
        <h3>Action Approval Required</h3>
        <p>The agent wants to perform the following action:</p>
        <pre id="hitl-action" style="background: #f4f4f4; padding: 10px; overflow-x: auto; font-size: 0.9em;"></pre>
        <input type="text" id="hitl-reason" placeholder="Reason (optional)" style="width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box;" />
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button onclick="respondHitl(false)" style="padding: 8px 15px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Reject</button>
            <button onclick="respondHitl(true)" style="padding: 8px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Approve</button>
        </div>
    </div>
</div>

<script>
async function loadMessages() {
    try {
        const res = await fetch('/api/messages');
        const data = await res.json();
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';
        if (data.messages) {
            data.messages.forEach(msg => {
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                
                let contentHTML = '';
                if (msg.content) {
                    if (typeof msg.content === 'string') {
                        contentHTML = msg.content.replace(/\n/g, '<br/>');
                    } else {
                        contentHTML = JSON.stringify(msg.content, null, 2);
                    }
                }
                
                if (msg.tool_calls && msg.tool_calls.length > 0) {
                    let toolsHTML = msg.tool_calls.map(tc => {
                        let args = tc.function.arguments;
                        try {
                            args = JSON.stringify(JSON.parse(args), null, 2);
                        } catch (e) {}
                        return `<div style="margin-top: 10px; padding: 10px; background: #e9ecef; border-left: 4px solid #007bff; border-radius: 4px;">
                            <strong>Tool Call:</strong> <code>${tc.function.name}</code>
                            <pre style="margin-top: 5px; margin-bottom: 0; font-size: 0.9em; white-space: pre-wrap;">${args}</pre>
                        </div>`;
                    }).join('');
                    contentHTML += toolsHTML;
                }
                
                let headerText = msg.role;
                if (msg.role === 'tool' && msg.name) {
                    headerText = `Tool Result (${msg.name})`;
                }
                
                if (!contentHTML && msg.role === 'assistant') {
                    contentHTML = '<em style="color: #999;">Using tools...</em>';
                }
                
                div.innerHTML = `<strong style="text-transform: capitalize; color: #555;">${headerText}:</strong> <div style="margin-top: 5px; background: #f9f9f9; padding: 10px; border-radius: 4px;">${contentHTML}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    } catch (e) {
        console.error("Error loading messages", e);
    }
}

async function sendPrompt() {
    const input = document.getElementById('prompt-input');
    const text = input.value;
    if (!text) return;
    input.value = '';
    document.getElementById('agent-status').innerHTML = 'Agent is thinking...';
    try {
        await fetch('/api/prompt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        loadMessages();
    } catch (e) {
        document.getElementById('agent-status').innerHTML = `<span style="color: red;">Error: ${e.message || e}</span>`;
    }
}

document.getElementById('prompt-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') sendPrompt();
});

async function checkHitl() {
    try {
        const res = await fetch('/api/hitl/pending');
        const data = await res.json();
        const modal = document.getElementById('hitl-modal');
        if (data.pending) {
            document.getElementById('hitl-action').textContent = JSON.stringify(data.action, null, 2);
            modal.style.display = 'flex';
        } else {
            modal.style.display = 'none';
        }
    } catch (e) {
        console.error("Error checking HITL", e);
    }
}

async function respondHitl(approved) {
    const reason = document.getElementById('hitl-reason').value;
    await fetch('/api/hitl/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ approved, reason })
    });
    document.getElementById('hitl-modal').style.display = 'none';
    document.getElementById('hitl-reason').value = '';
}

async function updateStatus() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const statusDiv = document.getElementById('agent-status');
        if (!data.configured) {
            statusDiv.innerHTML = '<span style="color: #aaa;">Not configured — go to <a href="/config">Config</a></span>';
        } else if (data.pending_hitl) {
            statusDiv.innerHTML = '<span style="color: #e67e22;">Waiting for your approval...</span>';
        } else if (data.thinking) {
            statusDiv.innerHTML = '<span style="color: #74c221;">Agent is thinking...</span>';
        } else {
            statusDiv.innerHTML = '<span style="color: #aaa;">Agent idle</span>';
        }
    } catch (e) {
        console.error("Error checking status", e);
    }
}

setInterval(loadMessages, 3000);
setInterval(checkHitl, 2000);
setInterval(updateStatus, 1000);
loadMessages();
updateStatus();
</script>
{% endblock %}
